<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Young+Serif&display=swap" rel="stylesheet">
</head>

<body>

    <div class="container">
        <div class="section-one">
            <h1 class="section-one__name"> SUVIN </h1>
            <p class="section-one__role"> Web Developer </p>
            <a class="section-one__contact" href="index.html">Home</a>
        </div>

        <div class="contact-form">
            <form>
                <table>
                    <tr>
                        <td>Name:</td>
                        <td> <input type="text" placeholder="Enter your name" class="contact-form__input"> </td>
                    </tr>

                    <tr>
                        <td>Email:</td>
                        <td> <input type="Email" placeholder="Enter your Email" class="contact-form__input"> </td>
                    </tr>


                    <tr>
                        <td>Message:</td>
                        <td> <textarea placeholder="Message....!" class="contact-form__textarea"></textarea></td>
                    </tr>

                    <tr>
                        <td></td>
                        <td> <input type="Submit" class="contact-form__submit"> </td>
                    </tr>
                </table>
            </form>

            <div class="section-five">
                <p class="section-five__title">Social Media:
                    <a href="https://studio.youtube.com/channel/UCNcPC1RKEb4KqjVnFw7-Dvw">Youtube</a>
                    <a
                        href="https://www.linkedin.com/learning/career-journey?accountId=92695330&u=92695330&success=true&authUUID=4CAkVpOyTD%2Blsmu3nd2g4A%3D%3D">Linkedin
                    </a>
                </p>
                <p class="section-five__desc">&copy Suvin</p>
            </div>

        </div>
    </div>
</body>

</html>
